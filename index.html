<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kemra Designs | Modern Engineering</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">
            <img src="images/Kemra-logo.png" alt="Kemra Logo" class="logo-img">
            <span>KEMRA<span class="highlight">DESIGNS</span></span>
        </div>
        <div class="nav-links">
            <a href="#home" class="active">Home</a>
            <a href="#gallery">Autocad</a>
            <a href="#contact">Contact</a>
        </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1 class="glitch" data-text="Kemra">Kemra</h1>
            <p>Travel While You Stay</p>
            <a href="#gallery" class="cta-btn">View Autocad <i class="fa-solid fa-arrow-right"></i></a>
        </div>
        <div class="hero-bg-grid"></div>
    </section>

    <!-- Gallery Section -->
    <section id="gallery" class="gallery-section">
        <div class="section-header">
            <h2>Autocad</h2>
        </div>

        <div class="gallery-grid">
            <!-- Project 1 -->
            <div class="gallery-item" onclick="openLightbox(this)">
                <div class="image-wrapper">
                    <img src="images/struc6.png" alt="floor plan">
                    <div class="overlay">
                        <i class="fa-solid fa-expand"></i>
                    </div>
                </div>
                <div class="info">
                    <h3>floor plan</h3>
                </div>
            </div>

            <!-- Project 2 -->
            <div class="gallery-item" onclick="openLightbox(this)">
                <div class="image-wrapper">
                    <img src="images/struc7.png" alt="sleeping pods">
                    <div class="overlay">
                        <i class="fa-solid fa-expand"></i>
                    </div>
                </div>
                <div class="info">
                    <h3>sleeping pods</h3>
                </div>
            </div>

            <!-- Project 3 -->
            <div class="gallery-item" onclick="openLightbox(this)">
                <div class="image-wrapper">
                    <img src="images/struc8.png" alt="KEMRA staff van">
                    <div class="overlay">
                        <i class="fa-solid fa-expand"></i>
                    </div>
                </div>
                <div class="info">
                    <h3>KEMRA staff van</h3>
                </div>
            </div>

            <!-- Project 4 -->
            <div class="gallery-item" onclick="openLightbox(this)">
                <div class="image-wrapper">
                    <img src="images/struc3.png" alt="ANUKEM Resturant">
                    <div class="overlay">
                        <i class="fa-solid fa-expand"></i>
                    </div>
                </div>
                <div class="info">
                    <h3>ANUKEM Resturant</h3>
                </div>
            </div>

            <!-- Project 5 -->
            <div class="gallery-item" onclick="openLightbox(this)">
                <div class="image-wrapper">
                    <img src="images/struc10.png" alt="LUXORA Resturant">
                    <div class="overlay">
                        <i class="fa-solid fa-expand"></i>
                    </div>
                </div>
                <div class="info">
                    <h3>LUXORA Resturant</h3>
                </div>
            </div>

        </div>
    </section>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>
        <img class="lightbox-content" id="lightbox-img" alt="">
        <div id="caption"></div>
    </div>

    <!-- Footer -->
    <footer id="contact">
        <div class="footer-content">
            <p>&copy; 2026 Kemra Designs. Travel While You Stay.</p>
            <div class="socials">
                <a href="#" title="Facebook" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" title="TikTok" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
                <a href="#" title="LinkedIn" aria-label="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#" title="Instagram" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
